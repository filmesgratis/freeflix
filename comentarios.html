<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comentários | FreeFlix</title>

  <!-- FAVICON -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* HEADER */
header {
  padding: 25px 60px;
  border-bottom: 1px solid #222;
  font-size: 26px;
  letter-spacing: 3px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
header img {
  height: 36px;
  max-width: 180px;
  object-fit: contain;
}

/* BOTÃO VOLTAR */
header a {
  font-size: 14px;
  text-decoration: none;
  color: #fff;
  background: #e50914;
  padding: 10px 22px;
  border-radius: 20px;
  transition: 0.3s;
}

header a:hover {
  background: #b20710;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 60px auto;
  padding: 0 20px;
  text-align: center;
}

/* TITULO */
.container h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.container p {
  color: #aaa;
  margin-bottom: 15px;
  font-size: 16px;
}

/* CONTADOR DE COMENTÁRIOS */
.comment-count {
  margin-bottom: 25px;
  font-size: 16px;
  color: #ccc;
}

/* CUSDIS EXTERNO (PRETO) */
#cusdis_thread {
  background: #0f0f0f;
  border: 1px solid #222;
  border-radius: 14px;
  padding: 30px;
}

/* ALTURA */
#cusdis_thread iframe {
  min-height: 380px;
}

/* CAMPOS BRANCOS */
#cusdis_thread input,
#cusdis_thread textarea {
  background: #ffffff !important;
  color: #111 !important;
  border: 1px solid #ccc !important;
  border-radius: 6px;
}

/* PLACEHOLDER */
#cusdis_thread input::placeholder,
#cusdis_thread textarea::placeholder {
  color: #888;
}

/* TEXTOS DO FORMULÁRIO */
#cusdis_thread label,
#cusdis_thread .comment-form *,
#cusdis_thread .comment-input * {
  color: #111 !important;
}

/* FOOTER */
footer {
  border-top: 1px solid #222;
  text-align: center;
  padding: 20px;
  color: #777;
  font-size: 14px;
  margin-top: 60px;
}

/* MOBILE */
@media (max-width: 600px) {
  header {
    padding: 18px 20px;
  }

  header img {
    height: 30px;
  }
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="FreeFlix">
  <a href="https://filmesgratis.github.io/freeflix/">Voltar</a>
</header>

<div class="container">
  <h1>O que você achou do FreeFlix?</h1>
  <p>Comentários públicos, sem login e visíveis para todos.</p>

  <div class="comment-count">
    <span
      class="cusdis-comment-count"
      data-host="https://cusdis.com"
      data-app-id="6e51d30e-7528-4759-94d0-8b24970e4b83"
      data-page-url="https://filmesgratis.github.io/freeflix/comentarios.html">
    </span> Faça seu comentario
  </div>

  <div
    id="cusdis_thread"
    data-host="https://cusdis.com"
    data-app-id="6e51d30e-7528-4759-94d0-8b24970e4b83"
    data-page-id="freeflix-comentarios"
    data-page-url="https://filmesgratis.github.io/freeflix/comentarios.html"
    data-page-title="Comentários FreeFlix"
    data-theme="dark">
  </div>
</div>

<footer>
  © 2026 FreeFlix • Opinião da comunidade
</footer>

<script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
<script async src="https://cusdis.com/js/cusdis-count.umd.js"></script>
<script async defer src="https://cusdis.com/js/widget/lang/pt-br.js"></script>

</body>
</html>
