<!DOCTYPE html>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* HEADER */
header {
  padding: 25px 60px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  letter-spacing: 3px;
  font-size: 26px;
}

.search {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  width: 260px;
}

/* CONTEÚDO CENTRAL */
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 50px 20px;
}

/* GRID DE FILMES */
.catalogo {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
}

/* CARD */
.card {
  cursor: pointer;
  text-align: center;
}

.capa {
  width: 100%;
  height: 260px;
  background-size: cover;
  background-position: center;
  border-radius: 12px;
  margin-bottom: 12px;
  transition: transform 0.3s;
}

.card:hover .capa {
  transform: scale(1.05);
}

.titulo {
  font-size: 15px;
}

/* PAGINAÇÃO */
.paginacao {
  margin-top: 60px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.paginacao a {
  padding: 12px 28px;
  border: 2px solid #fff;
  border-radius: 30px;
  text-decoration: none;
  color: #fff;
  font-size: 14px;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .catalogo {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
