<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FreeFlix | Filmes</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

header {
  padding: 25px 60px;
  border-bottom: 1px solid #222;
  font-size: 26px;
  letter-spacing: 3px;
}

.main {
  max-width: 1300px;
  margin: auto;
  padding: 50px 30px;
}

.catalogo {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 30px;
}

.card {
  cursor: pointer;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.08);
}

.capa {
  width: 100%;
  aspect-ratio: 2 / 3;
  background-size: cover;
  background-position: center;
  border-radius: 14px;
}

.titulo {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
}

@media (max-width: 1100px) {
  .catalogo {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 700px) {
  .catalogo {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<header>FREEFLIX</header>

<div class="main">

  <section class="catalogo">

    <!-- Homem de ferro -->
    <div class="card" onclick="window.location.href='player.html?id=cOn13An38W9&titulo=Homem%20de%20Ferro'">
