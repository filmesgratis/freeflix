<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeFlix | Filmes</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* HEADER */
header {
  padding: 25px 60px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between; /* <<< IGUAL AO COMENTÁRIOS */
  align-items: center;
}

header img {
  height: 36px;
}

/* BOTÃO VOLTAR – padrão FreeFlix */
.btn-voltar {
  font-size: 14px;
  text-decoration: none;
  color: #fff;
  background: #e50914;
  padding: 10px 22px;
  border-radius: 20px;
  transition: 0.3s;
}

.btn-voltar:hover {
  background: #b20710;
}

/* CONTEÚDO */
.main {
  max-width: 1300px;
  margin: auto;
  padding: 50px 30px;
}

.catalogo {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 30px;
}

.card {
  cursor: pointer;
  transition: transform 0.3s;
}

.card:hover {
  transform: scale(1.08);
}

.capa {
  width: 100%;
  aspect-ratio: 2 / 3;
  background-size: cover;
  background-position: center;
  border-radius: 14px;
}

.titulo {
  margin-top: 10px;
  font-size: 14px;
  text-align: center;
}

/* RESPONSIVO */
@media (max-width: 1100px) {
  .catalogo {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 700px) {
  header {
    padding: 18px 20px;
  }

  header img {
    height: 30px;
  }

  .catalogo {
    grid-template-columns: repeat(2, 1fr);
  }

  .btn-voltar {
    font-size: 13px;
    padding: 8px 18px;
  }
}
</style>
</head>
