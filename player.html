<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Assistir | FreeFlix</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  background: #000;
  color: #fff;
}

/* HEADER */
header {
  padding: 25px 60px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between; /* mesmo do comentários */
  align-items: center;
}

header img {
  height: 36px;
}

/* BOTÃO VOLTAR – padrão FreeFlix */
.btn-voltar {
  font-size: 14px;
  text-decoration: none;
  color: #fff;
  background: #e50914;
  padding: 10px 22px;
  border-radius: 20px;
  transition: 0.3s;
}

.btn-voltar:hover {
  background: #b20710;
}

/* CONTEÚDO */
.main {
  max-width: 1200px;
  margin: auto;
  padding: 50px 30px;
}

.titulo-filme {
  font-size: 32px;
  margin-bottom: 25px;
}

.player-wrapper {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

.player-wrapper iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

/* MOBILE */
@media (max-width: 700px) {
  header {
    padding: 18px 20px;
  }

  header img {
    height: 30px;
  }

  .btn-voltar {
    font-size: 13px;
    padding: 8px 18px;
  }
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="FreeFlix">
  <!-- BOTÃO NO CANTO SUPERIOR DIREITO -->
  <a href="filmes.html" class="btn-voltar">Voltar</a>
</header>

<div class="main">

  <h1 class="titulo-filme" id="tituloFilme">Carregando...</h1>

  <div class="player-wrapper">
    <script id="playerScript"></script>
    <iframe id="playerIframe" scrolling="no" allowfullscreen></iframe>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const videoId = params.get("id");
const titulo = params.get("titulo");

if (videoId) {
  const tituloFinal = titulo ? decodeURIComponent(titulo) : "Assistir filme";

  document.getElementById("tituloFilme").innerText = tituloFinal;
  document.title = tituloFinal + " | FreeFlix";

  document.getElementById("playerScript").src =
    "https://go.screenpal.com/consumption/player_appearance/" + videoId + "/1.777778";

  document.getElementById("playerIframe").src =
    "https://go.screenpal.com/player/" + videoId + "?embed=1&download=0&share=0&cl=0";
} else {
  document.getElementById("tituloFilme").innerText = "Filme não encontrado";
}
</script>

</body>
</html>
